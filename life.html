<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aadi Shah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.2s ease;
    }
    img.hidden { opacity: 0; }

    .bars {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 3px;
      padding: 10px 10px 0;
      z-index: 10;
    }
    .bar {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #fff;
      width: 0%;
    }
    .bar-fill.done { width: 100%; }
    .bar-fill.go {
      width: 100%;
      transition: width 5s linear;
    }

    .tap { position: fixed; top: 0; bottom: 0; width: 45%; z-index: 5; cursor: pointer; }
    .tap-l { left: 0; }
    .tap-r { right: 0; }
  </style>
</head>
<body>

  <img id="img" src="" alt="">
  <div class="bars" id="bars"></div>
  <div class="tap tap-l" id="prev"></div>
  <div class="tap tap-r" id="next"></div>

<script>
  const photos = [
    '/images/life/beach-sunset.jpg',
    '/images/life/usc-sunset.jpg',
    '/images/life/usc-football.jpg',
    '/images/life/london.jpg',
    '/images/life/chicago-portrait.jpg',
    '/images/life/snow.jpg',
    '/images/life/chicago-river.jpg',
    '/images/life/nyc-night.jpg',
    '/images/life/la-skyline.jpg',
    '/images/life/zion.jpg',
    '/images/life/pacific-cliffs.jpg',
    '/images/life/coastal-waves.jpg',
    '/images/life/singapore-mbs.jpg',
    '/images/life/singapore-gardens.jpg',
    '/images/life/city-sunset.jpg',
    '/images/life/snoop.jpg',
    '/images/life/lightning-mcqueen.jpg',
    '/images/life/gtav.jpg',
    '/images/life/ferrari-garage.jpg',
    '/images/life/street-art.jpg',
    '/images/life/sparks.jpg',
  ];

  const img  = document.getElementById('img');
  const bars = document.getElementById('bars');

  bars.innerHTML = photos.map(() =>
    `<div class="bar"><div class="bar-fill"></div></div>`
  ).join('');
  const fills = [...bars.querySelectorAll('.bar-fill')];

  let cur = 0, t = null;

  function go(idx) {
    cur = ((idx % photos.length) + photos.length) % photos.length;
    img.classList.add('hidden');
    img.src = photos[cur];
    img.onload = () => img.classList.remove('hidden');
    if (cur + 1 < photos.length) new Image().src = photos[cur + 1];

    fills.forEach((f, i) => {
      f.classList.remove('go');
      f.style.transition = 'none';
      f.style.width = i < cur ? '100%' : '0%';
    });
    requestAnimationFrame(() => requestAnimationFrame(() => fills[cur].classList.add('go')));

    clearTimeout(t);
    t = setTimeout(() => go(cur + 1 < photos.length ? cur + 1 : 0), 5000);
  }

  document.getElementById('prev').addEventListener('click', () => go(cur - 1));
  document.getElementById('next').addEventListener('click', () => go(cur + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') go(cur + 1);
    if (e.key === 'ArrowLeft')  go(cur - 1);
  });

  go(0);
</script>
</body>
</html>
