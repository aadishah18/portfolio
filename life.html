<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life — Aadi Shah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0b0d;
      color: #f5f5f7;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .back {
      display: inline-block;
      font-size: 0.82rem;
      color: #6b7280;
      text-decoration: none;
      letter-spacing: 0.02em;
      padding: 2rem 1.5rem 1.5rem;
    }
    .back:hover { color: #38bdf8; }

    .grid {
      columns: 3;
      column-gap: 6px;
      padding: 0 6px 6px;
    }

    @media (max-width: 700px) { .grid { columns: 2; } }
    @media (max-width: 400px) { .grid { columns: 1; } }

    .grid img {
      width: 100%;
      display: block;
      margin-bottom: 6px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      border-radius: 3px;
    }
    .grid img:hover { opacity: 0.85; }

    /* LIGHTBOX */
    .lb {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .lb.open { opacity: 1; pointer-events: all; }

    .lb img {
      max-width: min(700px, 94vw);
      max-height: 92vh;
      object-fit: contain;
      border-radius: 6px;
    }

    .lb-close {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    .lb-close:hover { color: #fff; }

    .lb-prev, .lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 2rem;
      cursor: pointer;
      padding: 1rem;
      line-height: 1;
      transition: color 0.15s;
    }
    .lb-prev:hover, .lb-next:hover { color: #fff; }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }
  </style>
</head>

<body>

<a href="index.html" class="back">← Aadi Shah</a>

<div class="grid" id="grid">
  <img src="images/life/beach-sunset.jpg" alt="">
  <img src="images/life/usc-sunset.jpg" alt="">
  <img src="images/life/singapore-mbs.jpg" alt="">
  <img src="images/life/nyc-night.jpg" alt="">
  <img src="images/life/la-skyline.jpg" alt="">
  <img src="images/life/usc-football.jpg" alt="">
  <img src="images/life/london.jpg" alt="">
  <img src="images/life/chicago-river.jpg" alt="">
  <img src="images/life/zion.jpg" alt="">
  <img src="images/life/pacific-cliffs.jpg" alt="">
  <img src="images/life/singapore-gardens.jpg" alt="">
  <img src="images/life/coastal-waves.jpg" alt="">
  <img src="images/life/city-sunset.jpg" alt="">
  <img src="images/life/snow.jpg" alt="">
  <img src="images/life/snoop.jpg" alt="">
  <img src="images/life/sparks.jpg" alt="">
  <img src="images/life/ferrari-garage.jpg" alt="">
  <img src="images/life/gtav.jpg" alt="">
  <img src="images/life/lightning-mcqueen.jpg" alt="">
  <img src="images/life/street-art.jpg" alt="">
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-prev" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-next" id="lbNext">›</button>
</div>

<script>
  const imgs = Array.from(document.querySelectorAll('.grid img'));
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lbImg');
  let current = 0;

  function open(i) {
    current = i;
    lbImg.src = imgs[i].src;
    lb.classList.add('open');
  }
  function close() { lb.classList.remove('open'); }
  function prev() { open((current - 1 + imgs.length) % imgs.length); }
  function next() { open((current + 1) % imgs.length); }

  imgs.forEach((img, i) => img.addEventListener('click', () => open(i)));
  document.getElementById('lbClose').addEventListener('click', close);
  document.getElementById('lbPrev').addEventListener('click', prev);
  document.getElementById('lbNext').addEventListener('click', next);
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });
</script>

</body>
</html>
